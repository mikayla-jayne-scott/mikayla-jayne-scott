<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet the Team - Team 1596</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button id="darkModeToggle">🌙 Dark Mode</button>

    <!-- Logo -->
    <img src="images/TEAM_1596_Logo.jpg" alt="Team 1596 Logo" class="team-logo">
    
    <h1><span class="red">Meet the Team!</span></span></h1>

    
    <!-- Team Grid -->
    <div class="team-grid">
        <!-- Repeat this block for each member -->
        <div class="team-card">
            <img src="images/member1.jpg" alt="Member 1">
            <h3>Member</h3>
            <p class="role">Role</p>
            <p class="about">About me...</p>
            <p class="fun-fact"><strong>Fun Fact:</strong> Random fun fact!</p>
        </div>
        
        <div class="team-card">
            <img src="images/member2.jpg" alt="Member 2">
            <h3>Another member</h3>
            <p class="role">Role</p>
            <p class="about">About me...</p>
            <p class="fun-fact"><strong>Fun Fact:</strong> Random fun fact!</p>
        </div>
        
        <!-- ADD MORE MEMBERS HERE -->
        <!-- Each card has the same structure -->
    </div>
    <!-- Back Button -->
    <button class="btn-red" onclick="goToPage('index.html')">⬅️ Back Home</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
