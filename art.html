<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">  
  <link rel="stylesheet" href="art.css"> 
</head>
<body>
    <div class="container">
        <button id="darkModeToggle">🌙 Dark Mode</button>
        <!-- Logo -->
        <img src="images/TEAM_1596_Logo.jpg" alt="Team 1596 Logo" class="team-logo">

        <h1><span class="red">Our Team's Artwork!</span></span></h1>
        <p>Art that members of our team have drawn and submitted, click on a piece of art to know more about it and the artist that drew it</p>
        <main class="gallery">

        <div class="art-card" 
            data-artist="Lily" 
            data-description="Rebuilt Pin Design"
            data-year="2026"
            data-medium="IBSPaintX"
            data-school="Sault Area High School">
            <img src="images/Art/IMG_3444.png" alt="Artwork 1">
            <div class="art-overlay">Rebuilt 2025</div>
        </div>

        <div class="art-card" 
            data-artist="Lily" 
            data-description="T-Shirt Design 2026"
            data-year="2026"
            data-medium="IBSPaintX"
            data-school="Sault Area High School">
            <img src="images\Art/2026 season t-shirt front.JPG" alt="Artwork 1">
            <div class="art-overlay">2026 Rebuilt T-Shirt design</div>
        </div>

        <div class="art-card" 
            data-artist="Kirsi" 
            data-description="Alligator Pin Holding Tools"
            data-year="2026"
            data-medium="IBSPaintX"
            data-school="Sault Area High School">
            <img src="images\Art\IMG_2040.JPG" alt="Artwork 1">
            <div class="art-overlay">Team 1596 Pride</div>
        </div>

        <div class="art-card" 
            data-artist="Marek" 
            data-description="Instigators Pixel Art"
            data-year="2026"
            data-medium="PixilArt"
            data-school="Sault Area High School">
            <img src="images\Art\1596avatar.png" alt="Artwork 1">
            <div class="art-overlay">Instigators Pixel Art</div>
        </div>

        <div class="art-card" 
            data-artist="Kirsi" 
            data-description="Reefscape Pin Design"
            data-year="2025"
            data-medium="IBSPaintX"
            data-school="Sault Area High School">
            <img src="images\Art\image.webp" alt="Artwork 1">
            <div class="art-overlay">Reefscape 2025</div>
        </div>
        
        <div class="art-card" 
            data-artist="Lily" 
            data-description="2025 Rainbow Rumble pin design"
            data-year="2025"
            data-medium="Digital Sketchbook"
            data-school="Sault Area High School">
            <img src="images\Art\IMG_2736.webp" alt="Artwork 1">
            <div class="art-overlay">Rainbow Rumble Pin</div>
        </div>
        
        <div id="artModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <img id="modalImg" src="" alt="Artwork preview">
                <div class="artist-info">
                    <h3 id="modalArtist"></h3>
                    <p id="modalDescription"></p>
                    <hr>
                    <p><strong>Year:</strong> <span id="modalYear"></span></p>
                    <p><strong>Medium:</strong> <span id="modalMedium"></span></p>
                    <p><strong>School:</strong> <span id="modalSchool"></span></p>
                </div>
            </div>
        </div>
        
        <div class="home-button-container">
            <button class="btn-red" onclick="goToPage('index.html')">
                ⬅️ Back Home
            </button>
        </div>
    </div>
        
  <script>
            // --- Dark Mode Persistence ---
            const toggle = document.getElementById("darkModeToggle");
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark");
                toggle.textContent = "☀️ Light Mode";
            }
            toggle.addEventListener("click", () => {
                document.body.classList.toggle("dark");
                const dark = document.body.classList.contains("dark");
                localStorage.setItem("theme", dark ? "dark" : "light");
                toggle.textContent = dark ? "☀️ Light Mode" : "🌙 Dark Mode";
            });
            
            // --- Modal Logic ---
            const modal = document.getElementById("artModal");
            const close = modal.querySelector(".close");
            const modalImg = document.getElementById("modalImg");
            const modalArtist = document.getElementById("modalArtist");
            const modalDescription = document.getElementById("modalDescription");
            const modalYear = document.getElementById("modalYear");
            const modalMedium = document.getElementById("modalMedium");
            const modalSchool = document.getElementById("modalSchool");
            
            document.querySelectorAll(".art-card").forEach(card => {
                card.addEventListener("click", () => {
                    modalImg.src = card.querySelector("img").src;
                    modalArtist.textContent = card.dataset.artist;
                    modalDescription.textContent = card.dataset.description;
                    modalYear.textContent = card.dataset.year;
                    modalMedium.textContent = card.dataset.medium;
                    modalSchool.textContent = card.dataset.school;
                    modal.style.display = "flex";
                });
            });
            
            close.addEventListener("click", () => modal.style.display = "none");
            window.addEventListener("click", e => {
                if (e.target === modal) modal.style.display = "none";
            });

            function goToPage(page) {
                window.location.href = page;
            }
  </script>
</body>
</html>
